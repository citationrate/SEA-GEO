<div style="background-color:#0a0a0a;padding:40px 20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div style="max-width:480px;margin:0 auto;background:#141414;border:1px solid #2a2a2a;border-radius:4px;padding:40px;">
    <!-- HEADER -->
    <div style="text-align:center;margin-bottom:30px;">
      <img src="https://suite.citationrate.com/logo-email.png" alt="Citability Score" width="48" height="48" style="vertical-align:middle;border-radius:12px;" />
      <h1 style="color:#f5f0e8;font-size:20px;margin:16px 0 4px;">Citability Score</h1>
      <p style="color:#888;font-size:13px;margin:0;">AI Visibility Audit</p>

    <!-- CONTENT -->
    <h2 style="color:#f5f0e8;font-size:18px;margin:0 0 12px;">Security verification</h2>

      A sensitive action was requested on your account. Enter the code below to verify your identity.
    </p>
    <div style="text-align:center;margin:32px 0;">
      <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;padding:20px;display:inline-block;">
        <span style="color:#8dc5a7;font-size:32px;font-weight:700;letter-spacing:8px;font-family:monospace;">{{ .Token }}</span>

    </p>

    <!-- FOOTER -->
    <hr style="border:none;border-top:1px solid #2a2a2a;margin:30px 0 20px;">
    <p style="color:#555;font-size:11px;text-align:center;margin:0;">
